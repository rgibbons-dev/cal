<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fare Calculator</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap');

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Sans', sans-serif;
        color: #2b2b2b;
        background: #f4f1ed;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 24px 12px;
      }

      .placeholder {
        width: 100%;
        max-width: 420px;
      }

      .container {
        display: flex;
        flex-direction: column;
        width: 100%;
        gap: 14px;
      }

      h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.3px;
        color: #1a1a1a;
        margin-bottom: 2px;
      }

      .subtitle {
        font-size: 13px;
        color: #777;
        font-weight: 300;
        margin-bottom: 4px;
      }

      input, select {
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        border: 1.5px solid #d4d0cb;
        border-radius: 5px;
        padding: 0 8px;
        height: 30px;
        background: #fff;
        color: #2b2b2b;
        outline: none;
        transition: border-color 0.15s;
        width: 100%;
      }

      input:focus, select:focus { border-color: #999; }
      input::placeholder { color: #b5b0a8; }

      input.disabled-field {
        background: #f5f4f2;
        color: #bbb;
        cursor: not-allowed;
      }

      button {
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        font-weight: 500;
        border: 1.5px solid #d4d0cb;
        border-radius: 5px;
        padding: 0 14px;
        height: 30px;
        background: #fff;
        color: #2b2b2b;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }

      button:hover {
        background: #edeae5;
        border-color: #bbb;
      }

      /* ── Auth bar ── */
      .auth-bar {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        min-height: 30px;
      }

      .auth-bar input {
        width: 110px;
      }

      .auth-bar .auth-user {
        color: #555;
        font-weight: 500;
      }

      .auth-bar .auth-msg {
        color: #c0695a;
        font-size: 11px;
      }

      /* ── Fare Rules ── */
      .fare-rules-panel {
        border: 1.5px solid #d4d0cb;
        border-radius: 8px;
        background: #fff;
        overflow: hidden;
      }

      .fare-rules-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 12px;
        cursor: pointer;
        user-select: none;
        transition: background 0.15s;
      }

      .fare-rules-header:hover { background: #faf9f7; }

      .fare-rules-header span {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: -0.2px;
      }

      .fare-rules-toggle {
        font-size: 11px;
        color: #999;
        transition: transform 0.2s;
      }

      .fare-rules-toggle.open { transform: rotate(180deg); }

      .fare-rules-body {
        display: none;
        padding: 0 12px 12px;
      }

      .fare-rules-body.open { display: block; }

      .fare-rule-card {
        border: 1.5px solid #eae8e4;
        border-radius: 6px;
        padding: 8px;
        margin-bottom: 6px;
        background: #fdfcfb;
      }

      .fare-rule-card .rule-top {
        display: flex;
        gap: 6px;
        margin-bottom: 6px;
        align-items: center;
      }

      .fare-rule-card .rule-top .rule-name {
        flex: 1;
        min-width: 0;
      }

      .fare-rule-card .rule-top .rule-type {
        width: 90px;
        flex-shrink: 0;
      }

      .fare-rule-card .rule-top .remove-rule {
        width: 24px;
        height: 24px;
        min-width: 24px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: #c0695a;
        border-color: transparent;
        background: transparent;
        border-radius: 4px;
        flex-shrink: 0;
      }

      .fare-rule-card .rule-top .remove-rule:hover {
        background: #fdf0ee;
        border-color: #e8c4be;
      }

      .fare-rule-card .rule-bottom {
        display: flex;
        gap: 6px;
      }

      .fare-rule-card .field {
        flex: 1;
        min-width: 0;
      }

      .fare-rule-card .field-label {
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: #aaa;
        margin-bottom: 2px;
      }

      .add-rule-btn {
        width: 100%;
        margin-top: 2px;
        font-size: 11px;
        border-style: dashed;
        color: #888;
        height: 28px;
      }

      .add-rule-btn:hover { color: #555; }

      /* ── Ruleset save/load ── */
      .ruleset-bar {
        display: flex;
        gap: 6px;
        align-items: center;
        padding-top: 8px;
        border-top: 1px solid #eae8e4;
        margin-top: 4px;
      }

      .ruleset-bar input {
        flex: 1;
        min-width: 0;
      }

      .ruleset-bar select {
        flex: 1;
        min-width: 0;
      }

      .ruleset-bar button {
        flex-shrink: 0;
        font-size: 11px;
        height: 28px;
        padding: 0 10px;
      }

      .ruleset-msg {
        font-size: 11px;
        color: #5aab6e;
        padding-top: 4px;
      }

      .ruleset-msg.error { color: #c0695a; }

      /* ── Legend ── */
      .legend {
        display: flex;
        gap: 12px;
        align-items: center;
        font-size: 11px;
        color: #888;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .legend-swatch {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        flex-shrink: 0;
      }

      /* ── Calendar ── */
      .cal-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .calendar {
        border: 1.5px solid #d4d0cb;
        border-radius: 8px;
        overflow: hidden;
        background: #fff;
      }

      .header span,
      .days span {
        display: inline-block;
        width: calc(100% / 7);
        height: 42px;
        line-height: 42px;
        text-align: center;
        font-size: 13px;
      }

      .header {
        background: #3b3735;
        color: #e8e4df;
      }

      .header span {
        font-weight: 500;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .days span {
        vertical-align: top;
        cursor: pointer;
        transition: background 0.12s;
        border-bottom: 1px solid #f0efed;
        border-right: 1px solid #f0efed;
        font-weight: 400;
        position: relative;
        -webkit-tap-highlight-color: transparent;
      }

      .days span:hover { background: #f5f3f0; }

      .days span.today {
        font-weight: 600;
        color: #1a1a1a;
      }

      .days span.weekend {
        background: #faf9f7;
        color: #aaa;
      }

      .days span.empty { cursor: default; }
      .days span.empty:hover { background: transparent; }

      .days span.has-trips {
        color: #fff;
        font-weight: 500;
        text-shadow: 0 1px 2px rgba(0,0,0,0.25);
      }

      /* ── Recommendation ── */
      #ticket-recommendation {
        border: 1.5px solid #d4d0cb;
        border-radius: 8px;
        background: #fff;
        padding: 14px 16px;
        font-size: 13px;
        line-height: 1.5;
      }

      #ticket-recommendation .label {
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #999;
        margin-bottom: 4px;
      }

      #ticket-recommendation .value {
        font-weight: 500;
        color: #1a1a1a;
      }

      #ticket-recommendation .cost {
        font-size: 12px;
        color: #777;
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <div class="placeholder">
      <div class="container">
        <!-- Auth bar -->
        <div class="auth-bar" id="auth-bar"></div>

        <div>
          <h1>Fare Calculator</h1>
          <p class="subtitle">Define your fare rules, tap days to add trips (up to 4), get the cheapest option. Sign in to save &amp; load fare rulesets. Loading a ruleset replaces the current rules.</p>
        </div>

        <!-- Fare Rules -->
        <div class="fare-rules-panel">
          <div class="fare-rules-header" id="fare-rules-toggle" role="button" tabindex="0" aria-expanded="true" aria-controls="fare-rules-body">
            <span>Fare Rules</span>
            <span class="fare-rules-toggle open" aria-hidden="true">&#9660;</span>
          </div>
          <div class="fare-rules-body open" id="fare-rules-body" role="region">
            <div id="fare-rules-list"></div>
            <button class="add-rule-btn" id="add-rule-btn">+ Add fare rule</button>
            <div id="ruleset-section"></div>
          </div>
        </div>

        <!-- Calendar -->
        <div class="cal-toolbar">
          <div class="legend">
            <div class="legend-item"><div class="legend-swatch" style="background:#c0695a"></div>1</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#5a8fc0"></div>2</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#5aab6e"></div>3</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#c9a84c"></div>4</div>
          </div>
          <button id="reset">Reset</button>
        </div>
        <div class="calendar">
          <div class="header">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
          </div>
          <div class="days"></div>
        </div>

        <div id="ticket-recommendation">
          <div class="label">Recommendation</div>
          <div class="value">Select travel days above</div>
          <div class="cost"></div>
        </div>

        <script type="module">
          import {
            FREQ_OPTIONS, FIELD_ACTIVE, FIELD_HINT, DEFAULT_RULES,
            parseRate, calculateOptimalTicket, consolidateTickets
          } from "./optimizer.js";

          // ─── Trip colors ───
          const C1 = "#c0695a";
          const C2 = "#5a8fc0";
          const C3 = "#5aab6e";
          const C4 = "#c9a84c";

          function tripBackground(n) {
            switch (n) {
              case 1: return C1;
              case 2: return `linear-gradient(to right, ${C1} 50%, ${C2} 50%)`;
              case 3:
                return `linear-gradient(to bottom, ${C1} 50%, ${C2} 50%) left/50% 100% no-repeat, ` +
                       `linear-gradient(${C3}, ${C3}) right/50% 100% no-repeat`;
              case 4:
                return `linear-gradient(to bottom, ${C1} 50%, ${C2} 50%) left/50% 100% no-repeat, ` +
                       `linear-gradient(to bottom, ${C3} 50%, ${C4} 50%) right/50% 100% no-repeat`;
              default: return "";
            }
          }

          let fareRules = DEFAULT_RULES.map(r => ({ ...r }));
          let tripMap = new Map();

          // ─── Auth state ───
          let currentUser = null;

          async function checkAuth() {
            try {
              const resp = await fetch("/api/me");
              const data = await resp.json();
              currentUser = data.loggedIn ? data.username : null;
            } catch { currentUser = null; }
            renderAuthBar();
            renderRulesetSection();
          }

          function renderAuthBar() {
            const bar = document.getElementById("auth-bar");
            bar.innerHTML = "";

            if (currentUser) {
              const userSpan = document.createElement("span");
              userSpan.className = "auth-user";
              userSpan.textContent = currentUser;
              const logoutBtn = document.createElement("button");
              logoutBtn.textContent = "Sign out";
              logoutBtn.addEventListener("click", async () => {
                await fetch("/api/logout", { method: "POST" });
                currentUser = null;
                renderAuthBar();
                renderRulesetSection();
              });
              bar.appendChild(userSpan);
              bar.appendChild(logoutBtn);
            } else {
              const userIn = document.createElement("input");
              userIn.placeholder = "username";
              userIn.id = "auth-username";
              const passIn = document.createElement("input");
              passIn.type = "password";
              passIn.placeholder = "password";
              passIn.id = "auth-password";
              const loginBtn = document.createElement("button");
              loginBtn.textContent = "Sign in";
              const signupBtn = document.createElement("button");
              signupBtn.textContent = "Sign up";
              const msgSpan = document.createElement("span");
              msgSpan.className = "auth-msg";
              msgSpan.id = "auth-msg";

              async function doAuth(endpoint) {
                msgSpan.textContent = "";
                const body = JSON.stringify({
                  username: userIn.value.trim(),
                  password: passIn.value,
                });
                try {
                  const resp = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body,
                  });
                  const data = await resp.json();
                  if (!resp.ok) {
                    msgSpan.textContent = data.error || "error";
                    return;
                  }
                  currentUser = data.username;
                  renderAuthBar();
                  renderRulesetSection();
                } catch (e) {
                  msgSpan.textContent = "network error";
                }
              }

              loginBtn.addEventListener("click", () => doAuth("/api/login"));
              signupBtn.addEventListener("click", () => doAuth("/api/signup"));

              bar.appendChild(userIn);
              bar.appendChild(passIn);
              bar.appendChild(loginBtn);
              bar.appendChild(signupBtn);
              bar.appendChild(msgSpan);
            }
          }

          // ─── Ruleset save/load section ───
          function renderRulesetSection() {
            const section = document.getElementById("ruleset-section");
            section.innerHTML = "";

            if (!currentUser) return;

            const bar = document.createElement("div");
            bar.className = "ruleset-bar";

            const nameIn = document.createElement("input");
            nameIn.placeholder = "ruleset name";
            nameIn.id = "ruleset-name";

            const saveBtn = document.createElement("button");
            saveBtn.textContent = "Save";

            const loadSel = document.createElement("select");
            loadSel.id = "ruleset-select";
            const defaultOpt = document.createElement("option");
            defaultOpt.value = "";
            defaultOpt.textContent = "Load...";
            loadSel.appendChild(defaultOpt);

            const deleteBtn = document.createElement("button");
            deleteBtn.textContent = "Del";
            deleteBtn.style.color = "#c0695a";

            bar.appendChild(nameIn);
            bar.appendChild(saveBtn);
            bar.appendChild(loadSel);
            bar.appendChild(deleteBtn);
            section.appendChild(bar);

            const msgEl = document.createElement("div");
            msgEl.className = "ruleset-msg";
            section.appendChild(msgEl);

            // Populate load dropdown
            refreshRulesetList(loadSel);

            saveBtn.addEventListener("click", async () => {
              const name = nameIn.value.trim();
              if (!name) { showMsg(msgEl, "enter a name", true); return; }
              try {
                const resp = await fetch("/api/rulesets/save", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ name, rules: fareRules }),
                });
                const data = await resp.json();
                if (!resp.ok) { showMsg(msgEl, data.error, true); return; }
                showMsg(msgEl, `saved "${name}"`, false);
                refreshRulesetList(loadSel);
              } catch { showMsg(msgEl, "network error", true); }
            });

            loadSel.addEventListener("change", async () => {
              const name = loadSel.value;
              if (!name) return;
              try {
                const resp = await fetch("/api/rulesets");
                const list = await resp.json();
                const found = list.find(r => r.name === name);
                if (found) {
                  fareRules = found.rules.map(r => ({ ...r }));
                  renderRules();
                  recalculate();
                  showMsg(msgEl, `loaded "${name}"`, false);
                }
              } catch { showMsg(msgEl, "network error", true); }
              loadSel.value = "";
            });

            deleteBtn.addEventListener("click", async () => {
              const name = loadSel.value || nameIn.value.trim();
              if (!name) { showMsg(msgEl, "select or enter name to delete", true); return; }
              try {
                await fetch("/api/rulesets/delete", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ name }),
                });
                showMsg(msgEl, `deleted "${name}"`, false);
                refreshRulesetList(loadSel);
              } catch { showMsg(msgEl, "network error", true); }
            });
          }

          async function refreshRulesetList(sel) {
            try {
              const resp = await fetch("/api/rulesets");
              const list = await resp.json();
              // Keep the first "Load..." option
              while (sel.options.length > 1) sel.remove(1);
              for (const rs of list) {
                const opt = document.createElement("option");
                opt.value = rs.name;
                opt.textContent = rs.name;
                sel.appendChild(opt);
              }
            } catch {}
          }

          function showMsg(el, text, isError) {
            el.textContent = text;
            el.className = "ruleset-msg" + (isError ? " error" : "");
            setTimeout(() => { el.textContent = ""; }, 3000);
          }

          // ─── Fare Rules UI ───
          const rulesListEl = document.getElementById("fare-rules-list");
          const addRuleBtn = document.getElementById("add-rule-btn");
          const toggleBtn = document.getElementById("fare-rules-toggle");
          const rulesBody = document.getElementById("fare-rules-body");
          const toggleArrow = toggleBtn.querySelector(".fare-rules-toggle");

          function renderRules() {
            rulesListEl.innerHTML = "";
            fareRules.forEach((rule, i) => {
              const card = document.createElement("div");
              card.className = "fare-rule-card";

              const fa = FIELD_ACTIVE[rule.frequency] || FIELD_ACTIVE["n-fare"];
              const fh = FIELD_HINT[rule.frequency] || FIELD_HINT["n-fare"];

              const top = document.createElement("div");
              top.className = "rule-top";

              const nameInput = document.createElement("input");
              nameInput.className = "rule-name";
              nameInput.type = "text";
              nameInput.value = rule.name;
              nameInput.placeholder = "Name";
              nameInput.setAttribute("aria-label", "Fare rule name");
              nameInput.addEventListener("input", e => {
                fareRules[i].name = e.target.value;
                recalculate();
              });

              const freqSelect = document.createElement("select");
              freqSelect.className = "rule-type";
              freqSelect.setAttribute("aria-label", "Fare type");
              FREQ_OPTIONS.forEach(([val, label]) => {
                const opt = document.createElement("option");
                opt.value = val;
                opt.textContent = label;
                if (val === rule.frequency) opt.selected = true;
                freqSelect.appendChild(opt);
              });
              freqSelect.addEventListener("change", e => {
                fareRules[i].frequency = e.target.value;
                renderRules();
                recalculate();
              });

              const removeBtn = document.createElement("button");
              removeBtn.className = "remove-rule";
              removeBtn.innerHTML = "&times;";
              removeBtn.setAttribute("aria-label", "Remove fare rule");
              removeBtn.addEventListener("click", () => {
                fareRules.splice(i, 1);
                renderRules();
                recalculate();
              });

              top.appendChild(nameInput);
              top.appendChild(freqSelect);
              top.appendChild(removeBtn);

              const bottom = document.createElement("div");
              bottom.className = "rule-bottom";

              // Rate
              const rateField = document.createElement("div");
              rateField.className = "field";
              const rateLabel = document.createElement("div");
              rateLabel.className = "field-label";
              rateLabel.textContent = "Rate";
              const rateInput = document.createElement("input");
              rateInput.type = "text";
              rateInput.inputMode = "decimal";
              rateInput.value = rule.rate;
              rateInput.placeholder = "$0.00";
              rateInput.setAttribute("aria-label", "Fare rate");
              rateInput.addEventListener("input", e => {
                fareRules[i].rate = e.target.value;
                recalculate();
              });
              rateField.appendChild(rateLabel);
              rateField.appendChild(rateInput);

              // Trips
              const tripsField = document.createElement("div");
              tripsField.className = "field";
              const tripsLabel = document.createElement("div");
              tripsLabel.className = "field-label";
              tripsLabel.textContent = "Trips";
              const tripsInput = document.createElement("input");
              tripsInput.type = "text";
              tripsInput.inputMode = "numeric";
              tripsInput.value = fa.trips ? (rule.trips || "") : "";
              tripsInput.placeholder = fh.trips || "\u2014";
              tripsInput.setAttribute("aria-label", "Number of trips");
              if (!fa.trips) {
                tripsInput.disabled = true;
                tripsInput.classList.add("disabled-field");
              }
              tripsInput.addEventListener("input", e => {
                fareRules[i].trips = parseInt(e.target.value, 10) || 0;
                recalculate();
              });
              tripsField.appendChild(tripsLabel);
              tripsField.appendChild(tripsInput);

              // Days / Expiry
              const daysField = document.createElement("div");
              daysField.className = "field";
              const daysLabel = document.createElement("div");
              daysLabel.className = "field-label";
              daysLabel.textContent = rule.frequency === "n-fare" ? "Expiry" : "Days";
              const daysInput = document.createElement("input");
              daysInput.type = "text";
              daysInput.inputMode = "numeric";
              daysInput.value = fa.days ? (rule.days || "") : "";
              daysInput.placeholder = fh.days || "\u2014";
              daysInput.setAttribute("aria-label", "Days");
              if (!fa.days) {
                daysInput.disabled = true;
                daysInput.classList.add("disabled-field");
              }
              daysInput.addEventListener("input", e => {
                fareRules[i].days = parseInt(e.target.value, 10) || 0;
                recalculate();
              });
              daysField.appendChild(daysLabel);
              daysField.appendChild(daysInput);

              bottom.appendChild(rateField);
              bottom.appendChild(tripsField);
              bottom.appendChild(daysField);

              card.appendChild(top);
              card.appendChild(bottom);
              rulesListEl.appendChild(card);
            });
          }

          addRuleBtn.addEventListener("click", () => {
            fareRules.push({ name: "", rate: "", frequency: "n-fare", trips: 1, days: 0 });
            renderRules();
          });

          toggleBtn.addEventListener("click", () => {
            const isOpen = rulesBody.classList.toggle("open");
            toggleArrow.classList.toggle("open", isOpen);
            toggleBtn.setAttribute("aria-expanded", isOpen);
          });

          toggleBtn.addEventListener("keydown", e => {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleBtn.click(); }
          });

          renderRules();

          // ─── Display ───
          function displayResult(result) {
            const el = document.getElementById("ticket-recommendation");
            const valueEl = el.querySelector(".value");
            const costEl = el.querySelector(".cost");

            if (result.tickets.length === 0) {
              valueEl.textContent = "Select travel days above";
              costEl.textContent = "";
              return;
            }

            valueEl.textContent = consolidateTickets(result.tickets).join(", ");
            costEl.textContent = `Estimated cost: $${result.cost.toFixed(2)}`;
          }

          function recalculate() {
            if (tripMap.size === 0) {
              displayResult({ tickets: [], cost: 0 });
              return;
            }
            const allActive = fareRules.filter(r => r.name && parseRate(r.rate) > 0);
            if (allActive.length === 0) {
              displayResult({ tickets: [], cost: 0 });
              return;
            }
            displayResult(calculateOptimalTicket(fareRules, tripMap));
          }

          // ─── Calendar ───
          function applyTripVisual(span, count) {
            span.classList.toggle("has-trips", count > 0);
            span.style.background = count > 0 ? tripBackground(count) : "";
          }

          document.addEventListener("DOMContentLoaded", () => {
            const daysContainer = document.querySelector(".days");
            let currentDate = new Date();
            currentDate.setHours(0, 0, 0, 0);
            let endDay;

            if (currentDate.getDate() <= 14) {
              endDay = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
            } else {
              endDay = new Date(currentDate.getFullYear(), currentDate.getMonth() + 2, 1);
            }

            const todayStr = new Date().toDateString();
            let init = true;

            while (currentDate < endDay) {
              const thisYear = currentDate.getFullYear();
              const thisMonth = currentDate.getMonth();
              const thisDay = currentDate.getDate();

              if (init) {
                for (let i = 0; i < currentDate.getDay(); i++) {
                  const empty = document.createElement("span");
                  empty.className = "empty";
                  daysContainer.appendChild(empty);
                }
                init = false;
              }

              const span = document.createElement("span");
              span.textContent = thisDay.toString();
              const dateKey = new Date(thisYear, thisMonth, thisDay).toDateString();

              span.addEventListener("click", function () {
                const allActive = fareRules.filter(r => r.name && parseRate(r.rate) > 0);
                if (allActive.length === 0) {
                  alert("Configure at least one fare rule with a name and rate first.");
                  return;
                }

                const entry = tripMap.get(dateKey);
                const current = entry ? entry.trips : 0;
                const next = (current + 1) % 5;

                if (next === 0) {
                  tripMap.delete(dateKey);
                } else {
                  tripMap.set(dateKey, {
                    date: new Date(thisYear, thisMonth, thisDay),
                    trips: next,
                  });
                }

                applyTripVisual(this, next);
                recalculate();
              });

              if (currentDate.toDateString() === todayStr) span.classList.add("today");
              if (currentDate.getDay() === 0 || currentDate.getDay() === 6) span.classList.add("weekend");

              daysContainer.appendChild(span);
              if (currentDate.getDay() === 6) daysContainer.appendChild(document.createElement("br"));

              currentDate.setDate(currentDate.getDate() + 1);
            }

            document.getElementById("reset").addEventListener("click", () => {
              tripMap.clear();
              document.querySelectorAll(".days span").forEach(el => applyTripVisual(el, 0));
              displayResult({ tickets: [], cost: 0 });
            });

            // Initial auth check
            checkAuth();
          });
        </script>
      </div>
    </div>
  </body>
</html>
