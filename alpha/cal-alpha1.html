<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cal-alpha1</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap');

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Sans', sans-serif;
        color: #2b2b2b;
        background: #f4f1ed;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 24px 12px;
      }

      .placeholder {
        width: 100%;
        max-width: 420px;
      }

      .container {
        display: flex;
        flex-direction: column;
        width: 100%;
        gap: 14px;
      }

      h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.3px;
        color: #1a1a1a;
        margin-bottom: 2px;
      }

      .subtitle {
        font-size: 13px;
        color: #777;
        font-weight: 300;
        margin-bottom: 4px;
      }

      input, select {
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        border: 1.5px solid #d4d0cb;
        border-radius: 5px;
        padding: 0 8px;
        height: 30px;
        background: #fff;
        color: #2b2b2b;
        outline: none;
        transition: border-color 0.15s;
        width: 100%;
      }

      input:focus, select:focus { border-color: #999; }
      input::placeholder { color: #b5b0a8; }

      input.disabled-field {
        background: #f5f4f2;
        color: #bbb;
        cursor: not-allowed;
      }

      button {
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        font-weight: 500;
        border: 1.5px solid #d4d0cb;
        border-radius: 5px;
        padding: 0 14px;
        height: 30px;
        background: #fff;
        color: #2b2b2b;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }

      button:hover {
        background: #edeae5;
        border-color: #bbb;
      }

      /* ── Fare Rules ── */
      .fare-rules-panel {
        border: 1.5px solid #d4d0cb;
        border-radius: 8px;
        background: #fff;
        overflow: hidden;
      }

      .fare-rules-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 12px;
        cursor: pointer;
        user-select: none;
        transition: background 0.15s;
      }

      .fare-rules-header:hover { background: #faf9f7; }

      .fare-rules-header span {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: -0.2px;
      }

      .fare-rules-toggle {
        font-size: 11px;
        color: #999;
        transition: transform 0.2s;
      }

      .fare-rules-toggle.open { transform: rotate(180deg); }

      .fare-rules-body {
        display: none;
        padding: 0 12px 12px;
      }

      .fare-rules-body.open { display: block; }

      .fare-rule-card {
        border: 1.5px solid #eae8e4;
        border-radius: 6px;
        padding: 8px;
        margin-bottom: 6px;
        background: #fdfcfb;
      }

      .fare-rule-card .rule-top {
        display: flex;
        gap: 6px;
        margin-bottom: 6px;
        align-items: center;
      }

      .fare-rule-card .rule-top .rule-name {
        flex: 1;
        min-width: 0;
      }

      .fare-rule-card .rule-top .rule-type {
        width: 90px;
        flex-shrink: 0;
      }

      .fare-rule-card .rule-top .remove-rule {
        width: 24px;
        height: 24px;
        min-width: 24px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: #c0695a;
        border-color: transparent;
        background: transparent;
        border-radius: 4px;
        flex-shrink: 0;
      }

      .fare-rule-card .rule-top .remove-rule:hover {
        background: #fdf0ee;
        border-color: #e8c4be;
      }

      .fare-rule-card .rule-bottom {
        display: flex;
        gap: 6px;
      }

      .fare-rule-card .field {
        flex: 1;
        min-width: 0;
      }

      .fare-rule-card .field-label {
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: #aaa;
        margin-bottom: 2px;
      }

      .add-rule-btn {
        width: 100%;
        margin-top: 2px;
        font-size: 11px;
        border-style: dashed;
        color: #888;
        height: 28px;
      }

      .add-rule-btn:hover { color: #555; }

      /* ── Legend ── */
      .legend {
        display: flex;
        gap: 12px;
        align-items: center;
        font-size: 11px;
        color: #888;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .legend-swatch {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        flex-shrink: 0;
      }

      /* ── Calendar ── */
      .cal-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .calendar {
        border: 1.5px solid #d4d0cb;
        border-radius: 8px;
        overflow: hidden;
        background: #fff;
      }

      .header span,
      .days span {
        display: inline-block;
        width: calc(100% / 7);
        height: 42px;
        line-height: 42px;
        text-align: center;
        font-size: 13px;
      }

      .header {
        background: #3b3735;
        color: #e8e4df;
      }

      .header span {
        font-weight: 500;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .days span {
        vertical-align: top;
        cursor: pointer;
        transition: background 0.12s;
        border-bottom: 1px solid #f0efed;
        border-right: 1px solid #f0efed;
        font-weight: 400;
        position: relative;
        -webkit-tap-highlight-color: transparent;
      }

      .days span:hover { background: #f5f3f0; }

      .days span.today {
        font-weight: 600;
        color: #1a1a1a;
      }

      .days span.weekend {
        background: #faf9f7;
        color: #aaa;
      }

      .days span.empty { cursor: default; }
      .days span.empty:hover { background: transparent; }

      .days span.has-trips {
        color: #fff;
        font-weight: 500;
        text-shadow: 0 1px 2px rgba(0,0,0,0.25);
      }

      /* ── Recommendation ── */
      #ticket-recommendation {
        border: 1.5px solid #d4d0cb;
        border-radius: 8px;
        background: #fff;
        padding: 14px 16px;
        font-size: 13px;
        line-height: 1.5;
      }

      #ticket-recommendation .label {
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #999;
        margin-bottom: 4px;
      }

      #ticket-recommendation .value {
        font-weight: 500;
        color: #1a1a1a;
      }

      #ticket-recommendation .cost {
        font-size: 12px;
        color: #777;
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <div class="placeholder">
      <div class="container">
        <div>
          <h1>Fare Calculator</h1>
          <p class="subtitle">Define your fare rules, tap days to add trips (up to 4), get the cheapest option.</p>
        </div>

        <!-- Fare Rules -->
        <div class="fare-rules-panel">
          <div class="fare-rules-header" id="fare-rules-toggle" role="button" tabindex="0" aria-expanded="true" aria-controls="fare-rules-body">
            <span>Fare Rules</span>
            <span class="fare-rules-toggle open" aria-hidden="true">&#9660;</span>
          </div>
          <div class="fare-rules-body open" id="fare-rules-body" role="region">
            <div id="fare-rules-list"></div>
            <button class="add-rule-btn" id="add-rule-btn">+ Add fare rule</button>
          </div>
        </div>

        <!-- Calendar -->
        <div class="cal-toolbar">
          <div class="legend">
            <div class="legend-item"><div class="legend-swatch" style="background:#c0695a"></div>1</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#5a8fc0"></div>2</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#5aab6e"></div>3</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#c9a84c"></div>4</div>
          </div>
          <button id="reset">Reset</button>
        </div>
        <div class="calendar">
          <div class="header">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
          </div>
          <div class="days"></div>
        </div>

        <div id="ticket-recommendation">
          <div class="label">Recommendation</div>
          <div class="value">Select travel days above</div>
          <div class="cost"></div>
        </div>

        <script type="module">
          // ─── Trip colors ───
          const C1 = "#c0695a";
          const C2 = "#5a8fc0";
          const C3 = "#5aab6e";
          const C4 = "#c9a84c";

          function tripBackground(n) {
            switch (n) {
              case 1: return C1;
              case 2: return `linear-gradient(to right, ${C1} 50%, ${C2} 50%)`;
              case 3:
                return `linear-gradient(to bottom, ${C1} 50%, ${C2} 50%) left/50% 100% no-repeat, ` +
                       `linear-gradient(${C3}, ${C3}) right/50% 100% no-repeat`;
              case 4:
                return `linear-gradient(to bottom, ${C1} 50%, ${C2} 50%) left/50% 100% no-repeat, ` +
                       `linear-gradient(to bottom, ${C3} 50%, ${C4} 50%) right/50% 100% no-repeat`;
              default: return "";
            }
          }

          // ─── Fare types ───
          // n-fare:   N rides within an expiry window (covers 1-trip, 2-trip, 10-trip, etc.)
          // n-day:    consecutive-day pass from first use
          // weekly:   calendar-aligned Mon–Sun (or Sat–Fri depending on agency)
          // monthly:  calendar-aligned 1st–last

          const FREQ_OPTIONS = [
            ["n-fare",   "N-fare"],
            ["n-day",    "N-day"],
            ["weekly",   "Weekly"],
            ["monthly",  "Monthly"],
          ];

          const FIELD_ACTIVE = {
            "n-fare":   { trips: true,  days: true  },
            "n-day":    { trips: false, days: true  },
            "weekly":   { trips: false, days: false },
            "monthly":  { trips: false, days: false },
          };

          const FIELD_HINT = {
            "n-fare":   { trips: "n", days: "expiry" },
            "n-day":    { trips: "",  days: "days"   },
            "weekly":   { trips: "",  days: ""       },
            "monthly":  { trips: "",  days: ""       },
          };

          const DEFAULT_RULES = [
            { name: "1-Trip",       rate: "",  frequency: "n-fare",   trips: 1,  days: 0  },
            { name: "10-Trip",      rate: "",  frequency: "n-fare",   trips: 10, days: 30 },
            { name: "3-Day Pass",   rate: "",  frequency: "n-day",    trips: 0,  days: 3  },
            { name: "Weekly Pass",  rate: "",  frequency: "weekly",   trips: 0,  days: 0  },
            { name: "Monthly Pass", rate: "",  frequency: "monthly",  trips: 0,  days: 0  },
          ];

          let fareRules = DEFAULT_RULES.map(r => ({ ...r }));
          let tripMap = new Map(); // dateString -> { date, trips }

          // ─── Fare Rules UI ───
          const rulesListEl = document.getElementById("fare-rules-list");
          const addRuleBtn = document.getElementById("add-rule-btn");
          const toggleBtn = document.getElementById("fare-rules-toggle");
          const rulesBody = document.getElementById("fare-rules-body");
          const toggleArrow = toggleBtn.querySelector(".fare-rules-toggle");

          function renderRules() {
            rulesListEl.innerHTML = "";
            fareRules.forEach((rule, i) => {
              const card = document.createElement("div");
              card.className = "fare-rule-card";

              const fa = FIELD_ACTIVE[rule.frequency] || FIELD_ACTIVE["n-fare"];
              const fh = FIELD_HINT[rule.frequency] || FIELD_HINT["n-fare"];

              const top = document.createElement("div");
              top.className = "rule-top";

              const nameInput = document.createElement("input");
              nameInput.className = "rule-name";
              nameInput.type = "text";
              nameInput.value = rule.name;
              nameInput.placeholder = "Name";
              nameInput.setAttribute("aria-label", "Fare rule name");
              nameInput.addEventListener("input", e => {
                fareRules[i].name = e.target.value;
                recalculate();
              });

              const freqSelect = document.createElement("select");
              freqSelect.className = "rule-type";
              freqSelect.setAttribute("aria-label", "Fare type");
              FREQ_OPTIONS.forEach(([val, label]) => {
                const opt = document.createElement("option");
                opt.value = val;
                opt.textContent = label;
                if (val === rule.frequency) opt.selected = true;
                freqSelect.appendChild(opt);
              });
              freqSelect.addEventListener("change", e => {
                fareRules[i].frequency = e.target.value;
                renderRules();
                recalculate();
              });

              const removeBtn = document.createElement("button");
              removeBtn.className = "remove-rule";
              removeBtn.innerHTML = "&times;";
              removeBtn.setAttribute("aria-label", "Remove fare rule");
              removeBtn.addEventListener("click", () => {
                fareRules.splice(i, 1);
                renderRules();
                recalculate();
              });

              top.appendChild(nameInput);
              top.appendChild(freqSelect);
              top.appendChild(removeBtn);

              const bottom = document.createElement("div");
              bottom.className = "rule-bottom";

              // Rate
              const rateField = document.createElement("div");
              rateField.className = "field";
              const rateLabel = document.createElement("div");
              rateLabel.className = "field-label";
              rateLabel.textContent = "Rate";
              const rateInput = document.createElement("input");
              rateInput.type = "text";
              rateInput.inputMode = "decimal";
              rateInput.value = rule.rate;
              rateInput.placeholder = "$0.00";
              rateInput.setAttribute("aria-label", "Fare rate");
              rateInput.addEventListener("input", e => {
                fareRules[i].rate = e.target.value;
                recalculate();
              });
              rateField.appendChild(rateLabel);
              rateField.appendChild(rateInput);

              // Trips
              const tripsField = document.createElement("div");
              tripsField.className = "field";
              const tripsLabel = document.createElement("div");
              tripsLabel.className = "field-label";
              tripsLabel.textContent = "Trips";
              const tripsInput = document.createElement("input");
              tripsInput.type = "text";
              tripsInput.inputMode = "numeric";
              tripsInput.value = fa.trips ? (rule.trips || "") : "";
              tripsInput.placeholder = fh.trips || "\u2014";
              tripsInput.setAttribute("aria-label", "Number of trips");
              if (!fa.trips) {
                tripsInput.disabled = true;
                tripsInput.classList.add("disabled-field");
              }
              tripsInput.addEventListener("input", e => {
                fareRules[i].trips = parseInt(e.target.value, 10) || 0;
                recalculate();
              });
              tripsField.appendChild(tripsLabel);
              tripsField.appendChild(tripsInput);

              // Days / Expiry
              const daysField = document.createElement("div");
              daysField.className = "field";
              const daysLabel = document.createElement("div");
              daysLabel.className = "field-label";
              daysLabel.textContent = rule.frequency === "n-fare" ? "Expiry" : "Days";
              const daysInput = document.createElement("input");
              daysInput.type = "text";
              daysInput.inputMode = "numeric";
              daysInput.value = fa.days ? (rule.days || "") : "";
              daysInput.placeholder = fh.days || "\u2014";
              daysInput.setAttribute("aria-label", "Days");
              if (!fa.days) {
                daysInput.disabled = true;
                daysInput.classList.add("disabled-field");
              }
              daysInput.addEventListener("input", e => {
                fareRules[i].days = parseInt(e.target.value, 10) || 0;
                recalculate();
              });
              daysField.appendChild(daysLabel);
              daysField.appendChild(daysInput);

              bottom.appendChild(rateField);
              bottom.appendChild(tripsField);
              bottom.appendChild(daysField);

              card.appendChild(top);
              card.appendChild(bottom);
              rulesListEl.appendChild(card);
            });
          }

          addRuleBtn.addEventListener("click", () => {
            fareRules.push({ name: "", rate: "", frequency: "n-fare", trips: 1, days: 0 });
            renderRules();
          });

          toggleBtn.addEventListener("click", () => {
            const isOpen = rulesBody.classList.toggle("open");
            toggleArrow.classList.toggle("open", isOpen);
            toggleBtn.setAttribute("aria-expanded", isOpen);
          });

          toggleBtn.addEventListener("keydown", e => {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleBtn.click(); }
          });

          renderRules();

          // ─── Helpers ───
          function parseRate(val) {
            const n = parseFloat(String(val).replace(/\$/g, ""));
            return isNaN(n) ? 0 : n;
          }

          function compd(a, b) { return a.getTime() - b.getTime(); }

          function daysBetween(a, b) {
            return Math.floor((b - a) / 86400000);
          }

          function monthKey(d) {
            return `${d.getFullYear()}-${d.getMonth()}`;
          }

          function activeRules(freq) {
            return fareRules.filter(r =>
              r.frequency === freq && r.name && parseRate(r.rate) > 0
            );
          }

          function cheapestRule(rules) {
            return rules.reduce((best, r) =>
              parseRate(r.rate) < parseRate(best.rate) ? r : best
            );
          }

          // ─── Expand tripMap into flat rides ───
          function expandRides() {
            const rides = [];
            for (const [, entry] of tripMap) {
              for (let i = 0; i < entry.trips; i++) {
                rides.push(new Date(entry.date));
              }
            }
            return rides.sort(compd);
          }

          // Cheapest per-ride cost from all n-fare rules
          function getBaseRideCost() {
            const nfRules = activeRules("n-fare");
            if (nfRules.length === 0) return Infinity;
            let min = Infinity;
            for (const r of nfRules) {
              const t = r.trips || 1;
              const cost = parseRate(r.rate) / t;
              if (cost < min) min = cost;
            }
            return min;
          }

          // Cheapest single-ride n-fare ticket name
          function getBaseRideName() {
            const nfRules = activeRules("n-fare");
            if (nfRules.length === 0) return null;
            let min = Infinity;
            let name = null;
            for (const r of nfRules) {
              const t = r.trips || 1;
              const cost = parseRate(r.rate) / t;
              if (cost < min) { min = cost; name = r.name; }
            }
            return name;
          }

          // ─── Weekly windows (Sat–Fri) ───
          function satBefore(d) {
            const s = new Date(d);
            s.setHours(0, 0, 0, 0);
            const diff = (s.getDay() + 1) % 7;
            s.setDate(s.getDate() - diff);
            return s;
          }

          function getWeeklyWindows(rides) {
            if (rides.length === 0) return [];
            const sorted = [...rides].sort(compd);
            const windows = [];
            let current = [sorted[0]];
            let windowStart = satBefore(sorted[0]);

            for (let i = 1; i < sorted.length; i++) {
              const d = sorted[i];
              if (daysBetween(windowStart, d) < 7) {
                current.push(d);
              } else {
                windows.push(current);
                current = [d];
                windowStart = satBefore(d);
              }
            }
            if (current.length > 0) windows.push(current);
            return windows;
          }

          // ─── N-fare grouping ───
          function getNFareGroups(rides, n, expiry) {
            if (rides.length === 0) return [];
            const sorted = [...rides].sort(compd);
            const groups = [];
            let i = 0;
            while (i < sorted.length) {
              const group = [sorted[i]];
              const anchor = sorted[i];
              let j = i + 1;
              while (j < sorted.length && group.length < n) {
                const span = daysBetween(anchor, sorted[j]);
                if (expiry > 0 && span >= expiry) break;
                group.push(sorted[j]);
                j++;
              }
              groups.push(group);
              i = j;
            }
            return groups;
          }

          // ─── N-day grouping ───
          function getNDayGroups(rides, duration) {
            if (rides.length === 0 || duration <= 0) return [];
            const sorted = [...rides].sort(compd);
            const groups = [];
            let i = 0;
            while (i < sorted.length) {
              const anchor = sorted[i];
              const group = [anchor];
              let j = i + 1;
              while (j < sorted.length) {
                if (daysBetween(anchor, sorted[j]) >= duration) break;
                group.push(sorted[j]);
                j++;
              }
              groups.push(group);
              i = j;
            }
            return groups;
          }

          // ─── Index-aware helpers for optimizer ───
          function mapGroupToIdx(group, remWithIdx) {
            const idxs = [];
            const pool = [...remWithIdx];
            for (const ride of group) {
              const found = pool.findIndex(r =>
                r.ride.getTime() === ride.getTime() && !idxs.includes(r.idx)
              );
              if (found !== -1) {
                idxs.push(pool[found].idx);
                pool.splice(found, 1);
              }
            }
            return idxs;
          }

          // ─── Optimizer ───
          //
          // Layered greedy on individual rides:
          //   1. Monthly  – calendar months (unlimited rides)
          //   2. N-day    – consecutive-day pass from first use (unlimited rides)
          //   3. Weekly   – calendar Sat–Fri (unlimited rides)
          //   4. N-fare   – multi-ride tickets covering remaining rides
          //
          // Passes (monthly, n-day, weekly) are compared against the base per-ride
          // cost derived from the cheapest n-fare rule (rate / trips).
          //
          export function calculateOptimalTicket() {
            const rides = expandRides();
            if (rides.length === 0) return { tickets: [], cost: 0 };

            const weeklyRules  = activeRules("weekly");
            const monthlyRules = activeRules("monthly");
            const nFareRules   = activeRules("n-fare");
            const nDayRules    = activeRules("n-day");

            const allActive = [...weeklyRules, ...monthlyRules, ...nFareRules, ...nDayRules];
            if (allActive.length === 0) return { tickets: [], cost: 0 };

            const baseRideCost = getBaseRideCost();

            let tickets = [];
            let totalCost = 0;
            let coveredIdx = new Set();

            function remWithIdx() {
              return rides
                .map((r, idx) => ({ ride: r, idx }))
                .filter(({ idx }) => !coveredIdx.has(idx));
            }

            // ── 1. Monthly ──
            if (monthlyRules.length > 0) {
              const rule = cheapestRule(monthlyRules);
              const rate = parseRate(rule.rate);

              const months = {};
              rides.forEach((r, idx) => {
                if (coveredIdx.has(idx)) return;
                const k = monthKey(r);
                if (!months[k]) months[k] = [];
                months[k].push(idx);
              });

              for (const [, idxs] of Object.entries(months)) {
                const altCost = idxs.length * (baseRideCost === Infinity ? rate : baseRideCost);
                if (rate < altCost) {
                  tickets.push(rule.name);
                  totalCost += rate;
                  idxs.forEach(i => coveredIdx.add(i));
                }
              }
            }

            // ── 2. N-day ──
            // Only cover rides where the pass is actually cheaper.
            // Rides not worth covering fall through to later steps.
            if (nDayRules.length > 0) {
              for (const rule of nDayRules) {
                const rate = parseRate(rule.rate);
                const duration = rule.days || 1;
                const rem = remWithIdx();
                if (rem.length === 0) break;

                const groups = getNDayGroups(rem.map(r => r.ride), duration);
                let pool = [...rem];
                for (const group of groups) {
                  const gIdx = mapGroupToIdx(group, pool);
                  pool = pool.filter(r => !gIdx.includes(r.idx));

                  const altCost = gIdx.length * (baseRideCost === Infinity ? rate : baseRideCost);
                  if (rate < altCost) {
                    tickets.push(rule.name);
                    totalCost += rate;
                    gIdx.forEach(i => coveredIdx.add(i));
                  }
                  // else: leave these rides for later steps
                }
              }
            }

            // ── 3. Weekly ──
            if (weeklyRules.length > 0) {
              const rule = cheapestRule(weeklyRules);
              const rate = parseRate(rule.rate);

              const rem = remWithIdx();
              const windows = getWeeklyWindows(rem.map(r => r.ride));

              let pool = [...rem];
              for (const win of windows) {
                const wIdx = mapGroupToIdx(win, pool);
                pool = pool.filter(r => !wIdx.includes(r.idx));

                const altCost = wIdx.length * (baseRideCost === Infinity ? rate : baseRideCost);
                if (rate < altCost) {
                  tickets.push(rule.name);
                  totalCost += rate;
                  wIdx.forEach(i => coveredIdx.add(i));
                }
              }
            }

            // ── 4. N-fare (covers all remaining rides) ──
            if (nFareRules.length > 0) {
              const rem = remWithIdx();
              if (rem.length > 0) {
                // Try each n-fare rule and pick the cheapest plan
                let bestPlan = null;
                let bestCost = Infinity;

                for (const rule of nFareRules) {
                  const rate = parseRate(rule.rate);
                  const n = rule.trips || 1;
                  const expiry = rule.days || 0;

                  const groups = getNFareGroups(rem.map(r => r.ride), n, expiry);
                  let planTickets = [];
                  let planCost = 0;

                  for (const group of groups) {
                    // Each group costs one ticket, even if partially used
                    planTickets.push(rule.name);
                    planCost += rate;
                  }

                  if (planCost < bestCost) {
                    bestCost = planCost;
                    bestPlan = { tickets: planTickets, cost: planCost };
                  }
                }

                // Also try mixing: use single-ride tickets for small remainders
                // by evaluating each n-fare rule and comparing buying a full ticket
                // vs individual rides at base cost
                if (nFareRules.length > 1 || (nFareRules[0] && (nFareRules[0].trips || 1) > 1)) {
                  const singleRule = nFareRules.find(r => (r.trips || 1) === 1);
                  const bulkRules = nFareRules.filter(r => (r.trips || 1) > 1);

                  if (singleRule && bulkRules.length > 0) {
                    for (const bulk of bulkRules) {
                      const bulkRate = parseRate(bulk.rate);
                      const bulkN = bulk.trips || 1;
                      const bulkExpiry = bulk.days || 0;
                      const singleRate = parseRate(singleRule.rate);

                      const groups = getNFareGroups(rem.map(r => r.ride), bulkN, bulkExpiry);
                      let planTickets = [];
                      let planCost = 0;

                      for (const group of groups) {
                        // Is it cheaper to buy one bulk ticket or individual singles?
                        const singlesCost = group.length * singleRate;
                        if (bulkRate < singlesCost) {
                          planTickets.push(bulk.name);
                          planCost += bulkRate;
                        } else {
                          group.forEach(() => planTickets.push(singleRule.name));
                          planCost += singlesCost;
                        }
                      }

                      if (planCost < bestCost) {
                        bestCost = planCost;
                        bestPlan = { tickets: planTickets, cost: planCost };
                      }
                    }
                  }
                }

                if (bestPlan) {
                  tickets.push(...bestPlan.tickets);
                  totalCost += bestPlan.cost;
                  // All remaining are now covered
                }
              }
            }

            // ── Fallback: any rides still uncovered ──
            // This catches edge cases where no rule was cost-effective
            // but rides need assignment (e.g. only a monthly, 1 ride).
            const finalRem = remWithIdx();
            if (finalRem.length > 0) {
              const fallback = allActive.reduce((best, r) =>
                parseRate(r.rate) < parseRate(best.rate) ? r : best
              );
              const fbRate = parseRate(fallback.rate);
              // For pass-type rules, one purchase covers the group
              if (fallback.frequency === "monthly" || fallback.frequency === "weekly" || fallback.frequency === "n-day") {
                tickets.push(fallback.name);
                totalCost += fbRate;
              } else {
                // n-fare: one ticket per group
                const n = fallback.trips || 1;
                const expiry = fallback.days || 0;
                const groups = getNFareGroups(finalRem.map(r => r.ride), n, expiry);
                for (const g of groups) {
                  tickets.push(fallback.name);
                  totalCost += fbRate;
                }
              }
            }

            return { tickets, cost: totalCost };
          }

          // ─── Display ───
          function consolidateTickets(ticketList) {
            const counts = ticketList.reduce((acc, t) => {
              acc[t] = (acc[t] || 0) + 1;
              return acc;
            }, {});
            return Object.entries(counts).map(([name, count]) =>
              count > 1 ? `${name} \u00d7${count}` : name
            );
          }

          function displayResult(result) {
            const el = document.getElementById("ticket-recommendation");
            const valueEl = el.querySelector(".value");
            const costEl = el.querySelector(".cost");

            if (result.tickets.length === 0) {
              valueEl.textContent = "Select travel days above";
              costEl.textContent = "";
              return;
            }

            valueEl.textContent = consolidateTickets(result.tickets).join(", ");
            costEl.textContent = `Estimated cost: $${result.cost.toFixed(2)}`;
          }

          function recalculate() {
            if (tripMap.size === 0) {
              displayResult({ tickets: [], cost: 0 });
              return;
            }
            const allActive = fareRules.filter(r => r.name && parseRate(r.rate) > 0);
            if (allActive.length === 0) {
              displayResult({ tickets: [], cost: 0 });
              return;
            }
            displayResult(calculateOptimalTicket());
          }

          // ─── Calendar ───
          function applyTripVisual(span, count) {
            span.classList.toggle("has-trips", count > 0);
            span.style.background = count > 0 ? tripBackground(count) : "";
          }

          document.addEventListener("DOMContentLoaded", () => {
            const daysContainer = document.querySelector(".days");
            let currentDate = new Date();
            currentDate.setHours(0, 0, 0, 0);
            let endDay;

            if (currentDate.getDate() <= 14) {
              endDay = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
            } else {
              endDay = new Date(currentDate.getFullYear(), currentDate.getMonth() + 2, 1);
            }

            const todayStr = new Date().toDateString();
            let init = true;

            while (currentDate < endDay) {
              const thisYear = currentDate.getFullYear();
              const thisMonth = currentDate.getMonth();
              const thisDay = currentDate.getDate();

              if (init) {
                for (let i = 0; i < currentDate.getDay(); i++) {
                  const empty = document.createElement("span");
                  empty.className = "empty";
                  daysContainer.appendChild(empty);
                }
                init = false;
              }

              const span = document.createElement("span");
              span.textContent = thisDay.toString();
              const dateKey = new Date(thisYear, thisMonth, thisDay).toDateString();

              span.addEventListener("click", function () {
                const allActive = fareRules.filter(r => r.name && parseRate(r.rate) > 0);
                if (allActive.length === 0) {
                  alert("Configure at least one fare rule with a name and rate first.");
                  return;
                }

                const entry = tripMap.get(dateKey);
                const current = entry ? entry.trips : 0;
                const next = (current + 1) % 5;

                if (next === 0) {
                  tripMap.delete(dateKey);
                } else {
                  tripMap.set(dateKey, {
                    date: new Date(thisYear, thisMonth, thisDay),
                    trips: next,
                  });
                }

                applyTripVisual(this, next);
                recalculate();
              });

              if (currentDate.toDateString() === todayStr) span.classList.add("today");
              if (currentDate.getDay() === 0 || currentDate.getDay() === 6) span.classList.add("weekend");

              daysContainer.appendChild(span);
              if (currentDate.getDay() === 6) daysContainer.appendChild(document.createElement("br"));

              currentDate.setDate(currentDate.getDate() + 1);
            }

            document.getElementById("reset").addEventListener("click", () => {
              tripMap.clear();
              document.querySelectorAll(".days span").forEach(el => applyTripVisual(el, 0));
              displayResult({ tickets: [], cost: 0 });
            });
          });
        </script>
      </div>
    </div>
  </body>
</html>
